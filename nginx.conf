worker_processes 1;
events { worker_connections 1024; }

http {
    access_log off;
    error_log /dev/stderr warn;

    upstream api {
        server api1:8000;
        server api2:8000;
    }

    server {
        listen 9999;

        location / {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
